name: AKS Kustomize Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target overlay environment'
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install kubelogin
        run: |
          az aks install-cli

      - name: Set AKS context
        run: |
          az aks get-credentials \
            --resource-group "$AKS_RESOURCE_GROUP" \
            --name "$AKS_CLUSTER_NAME" \
            --overwrite-existing
        env:
          AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Validate cluster access
        run: |
          kubectl version --client
          kubectl get nodes --no-headers

      - name: Preview rendered Kustomize output
        run: |
          kubectl kustomize "$KUSTOMIZE_DIR" > rendered-kustomize.yaml
          echo "Rendered YAML written to rendered-kustomize.yaml"
        env:
          KUSTOMIZE_DIR: kustomize-lab/overlays/${{ github.event.inputs.environment }}

      - name: Apply Kustomize overlay
        run: |
          kubectl apply -k "$KUSTOMIZE_DIR"
        env:
          KUSTOMIZE_DIR: kustomize-lab/overlays/${{ github.event.inputs.environment }}

      - name: Confirm deployment
        run: |
          kubectl get deploy -n "$NAMESPACE"
          kubectl get svc -n "$NAMESPACE"
        env:
          NAMESPACE: ${{ github.event.inputs.environment }}
